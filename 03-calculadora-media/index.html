<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Média</title>
  <link rel="stylesheet" href="style.css" />
  <script src="./main.js" defer></script>
</head>

<body>

  <main>
    <div class="conteudo">

      <a href="../index.html" class="voltar">← Voltar</a>

      <h1>
        Calculadora de
        <span>Média</span>
      </h1>
      <p class="descricao">Digite as três notas para calcular a situação do aluno.</p>

      <label>Nota 1</label>
      <input id="n1" type="number" placeholder="0 a 10" min="0" max="10" />

      <label>Nota 2</label>
      <input id="n2" type="number" placeholder="0 a 10" min="0" max="10"/>

      <label>Nota 3</label>
      <input id="n3" type="number" placeholder="0 a 10" min="0" max="10"/>

      <button onclick="calcularMedia()">Calcular Média</button>

      <div id="resultado" class="resultado">
        O resultado aparecerá aqui
      </div>

    </div>
  </main>

  <footer>
    <p>Prof. Fernando Leonid</p>
  </footer>

</body>

</html>
